<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem;
      border: 1px solid #333;
      border-radius: 16px;
      background: #1a1a1a;
      max-width: 480px;
      width: 90%;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #aaa; margin-bottom: 1.5rem; }
    .links a {
      display: inline-block;
      margin: 0.4rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid #444;
      border-radius: 8px;
      color: #f0f0f0;
      text-decoration: none;
      transition: background 0.2s;
    }
    .links a:hover { background: #333; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hey, I'm Your fan sindresorhus 👋</h1>
    <p>Developer · Creator · Explorer</p>
    <div class="links">
      <a href="https://github.com/tedo001">GitHub</a>
    </div>
  </div>
</body>
</html>
